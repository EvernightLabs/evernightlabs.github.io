<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evernight Labs</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон */
            color: #ffffff; /* Белый текст */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }
        .logo {
            max-width: 600px;
            width: 100%;
            height: auto;
            margin-bottom: 30px;
        }
        .message {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Evernight Labs" class="logo">
    <div class="message">Сайт находится в разработке</div>
</body>
</html>
