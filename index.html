<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evernight Labs</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .logo {
            max-width: 450px;
            width: 80%;
            opacity: 0;
            animation: fadeIn 4s ease-out 0.3s forwards; 
        }

        @keyframes fadeIn {
            0% { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .status {
            position: absolute;
            bottom: 40px;
            color: #333333;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 2s ease-out 1.5s forwards;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="Evernight Labs" class="logo">
    
    <div class="status">In progress</div>

</body>
</html>
